<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ABC Fitness Studio - Gallery</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <header>
    <div class="brand">
      <img src="assets/Client2_LogoPalette2_20458E.png" alt="ABC Fitness Studio Logo" width="100">
      <h1>ABC Fitness Studio</h1>
    </div>

    <nav>
      <a href="index.html">Home</a>
      <a href="gallery.html">Gallery</a>
      <a href="about.html">About</a>
      <a href="custom.html">Custom</a>
    </nav>
  </header>

  <div class="wrapper">
    <section class="card">
      <h2>Gallery</h2>
      <p>Photos of classes and featured equipment.</p>
      <button class="btn" type="button">View Shopping Cart</button>
    </section>

    <section class="card">
      <h2>Classes</h2>
      <div class="grid">
        <figure>
          <img src="assets/Client2_IndividualYoga.png" alt="Individual yoga session">
          <figcaption>Individual yoga session</figcaption>
        </figure>

        <figure>
          <img src="assets/Client2_GroupYoga.png" alt="Group yoga session">
          <figcaption>Group yoga session</figcaption>
        </figure>

        <figure>
          <img src="assets/Client2_IndividualPilates.png" alt="Individual Pilates session">
          <figcaption>Individual Pilates session</figcaption>
        </figure>

        <figure>
          <img src="assets/Client2_GroupPilates.png" alt="Group Pilates session">
          <figcaption>Group Pilates session</figcaption>
        </figure>

        <figure>
          <img src="assets/Client2_IndividualKickboxing.png" alt="Individual kickboxing session">
          <figcaption>Individual kickboxing session</figcaption>
        </figure>

        <figure>
          <img src="assets/Client2_GroupKickboxing.png" alt="Group kickboxing session">
          <figcaption>Group kickboxing session</figcaption>
        </figure>
      </div>
    </section>

    <section class="card">
      <h2>Equipment</h2>
      <div class="grid">
        <figure>
          <img src="assets/Client2_YogaMat.png" alt="Yoga mat">
          <figcaption>Yoga mat</figcaption>
        </figure>

        <figure>
          <img src="assets/Client2_WaterBottle.png" alt="Water bottle">
          <figcaption>Water bottle</figcaption>
        </figure>

        <figure>
          <img src="assets/Client2_TeeShirt.png" alt="Tee shirt">
          <figcaption>Tee shirt</figcaption>
        </figure>
      </div>
    </section>

    <footer>
      <p>Newsletter + Social Media Links + Navigation Links</p>
      <button id="subscribeBtn" class="btn" type="button">Subscribe</button>
    </footer>
  </div>
</body>
</html>
